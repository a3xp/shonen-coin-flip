<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>運命のコイン — Shonen Coin Flip</title>

  <style>
    :root {
      --gold: #ffd86b;
      --gold-dark: #b97700;
      --blue: #55d6ff;
      --violet: #aa55ff;
      --red: #ff3b6b;
      --panel: rgba(8, 12, 30, 0.72);
      --text: #f7f8ff;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      overflow-y: auto;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 40%, rgba(65, 50, 140, 0.55), transparent 28%),
        linear-gradient(160deg, #050713 0%, #0d1231 48%, #170723 100%);
    }

    body.shake {
      animation: screenShake 0.55s linear;
    }

    .app {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
      padding: 24px;
      overflow: visible;
    }

    .stars,
    .speed-lines,
    .particles,
    .flash,
    .impact-ring {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .stars {
      z-index: -5;
      opacity: 0.72;
      background-image:
        radial-gradient(circle, white 0 1px, transparent 1.5px),
        radial-gradient(circle, #8be8ff 0 1px, transparent 1.5px);
      background-size: 52px 52px, 90px 90px;
      background-position: 0 0, 25px 25px;
      animation: drift 18s linear infinite;
    }


    .manga-sun,
    .manga-grid,
    .manga-ink {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .manga-sun {
      z-index: -4;
      background:
        radial-gradient(circle at 50% 47%, rgba(255, 70, 70, 0.72) 0 7%, transparent 7.5%),
        repeating-conic-gradient(
          from -8deg at 50% 47%,
          rgba(255, 68, 68, 0.34) 0deg 5deg,
          transparent 5deg 11deg
        );
      mask-image: radial-gradient(circle at 50% 47%, black 0 48%, transparent 76%);
      opacity: 0.82;
      animation: sunPulse 3.2s ease-in-out infinite;
    }

    .manga-grid {
      z-index: -3;
      opacity: 0.14;
      background-image:
        linear-gradient(rgba(255,255,255,0.55) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.55) 1px, transparent 1px);
      background-size: 38px 38px;
      transform: perspective(600px) rotateX(63deg) scale(1.8) translateY(28%);
      transform-origin: center bottom;
    }

    .manga-ink {
      z-index: -2;
      opacity: 0.15;
      filter: blur(1px);
      background:
        radial-gradient(ellipse at center, black 0 38%, transparent 40%);
      mix-blend-mode: multiply;
    }

    .ink-one {
      width: 340px;
      height: 190px;
      inset: auto auto 8% -70px;
      transform: rotate(-18deg);
    }

    .ink-two {
      width: 300px;
      height: 160px;
      inset: 8% -75px auto auto;
      transform: rotate(19deg);
    }

    .jp-kicker {
      margin-bottom: 8px;
      font-size: clamp(0.78rem, 2vw, 1rem);
      font-weight: 1000;
      letter-spacing: 0.45em;
      color: #ffd85a;
      text-shadow:
        0 0 10px rgba(255, 216, 90, 0.9),
        2px 2px 0 #5a102d;
    }

    .speed-lines {
      z-index: 4;
      opacity: 0;
      background:
        repeating-conic-gradient(
          from 0deg at 50% 50%,
          rgba(255,255,255,0.9) 0deg 0.45deg,
          transparent 0.45deg 7deg
        );
      mask-image: radial-gradient(circle, transparent 0 22%, black 55%, transparent 92%);
      transform: scale(1.4);
    }

    .speed-lines.active {
      animation: speedBurst 1.3s ease-out;
    }

    .flash {
      z-index: 8;
      opacity: 0;
      background: white;
      mix-blend-mode: screen;
    }

    .flash.active {
      animation: flash 0.35s ease-out;
    }

    .impact-ring {
      z-index: 3;
      display: grid;
      place-items: center;
    }

    .impact-ring::before,
    .impact-ring::after {
      content: "";
      position: absolute;
      width: 90px;
      height: 90px;
      border: 5px solid rgba(255, 240, 150, 0.95);
      border-radius: 50%;
      opacity: 0;
      box-shadow:
        0 0 18px rgba(255, 220, 80, 0.9),
        0 0 60px rgba(111, 90, 255, 0.7);
    }

    .impact-ring.active::before {
      animation: ringExpand 0.8s ease-out;
    }

    .impact-ring.active::after {
      animation: ringExpand 0.8s 0.12s ease-out;
    }

    .panel {
      position: relative;
      width: min(920px, 100%);
      padding: clamp(24px, 5vw, 52px);
      border: 3px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,0.12) 0 1px, transparent 1.6px) 0 0 / 12px 12px,
        linear-gradient(145deg, rgba(20,26,62,0.96), rgba(33,8,50,0.95));
      box-shadow:
        10px 10px 0 rgba(0,0,0,0.82),
        0 30px 90px rgba(0,0,0,0.62),
        inset 0 0 0 5px rgba(255,68,102,0.14);
      backdrop-filter: blur(18px);
      text-align: center;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(110deg, #38d7ff, #8f49ff, #ff4375, #ffd86b);
      filter: blur(18px);
      opacity: 0.28;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 8vw, 5.8rem);
      line-height: 0.88;
      letter-spacing: -0.08em;
      text-transform: uppercase;
      font-style: italic;
      transform: skewX(-7deg);
      color: #fff;
      -webkit-text-stroke: 2px #15121d;
      text-shadow:
        5px 5px 0 #ff3f68,
        9px 9px 0 #42112f,
        0 0 22px rgba(95,220,255,0.7);
    }

    .subtitle {
      margin: 16px auto 22px;
      color: #ccd3ff;
      max-width: 640px;
      font-size: clamp(0.95rem, 2vw, 1.12rem);
    }

    .arena {
      position: relative;
      height: 330px;
      display: grid;
      place-items: center;
      perspective: 1200px;
    }

    .aura {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.9) 0 2%, transparent 7%),
        radial-gradient(circle, rgba(80,220,255,0.65), rgba(137,70,255,0.35) 48%, transparent 70%);
      filter: blur(13px);
      transform: scale(0.85);
      opacity: 0.7;
      animation: pulseAura 2.4s ease-in-out infinite;
    }

    .arena.flipping .aura {
      animation: superAura 0.36s linear infinite;
    }

    .coin-wrapper {
      position: relative;
      width: 180px;
      height: 180px;
      transform-style: preserve-3d;
      z-index: 2;
      filter: drop-shadow(0 24px 24px rgba(0,0,0,0.45));
    }

    .coin {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform: rotateY(0deg) rotateX(8deg);
      will-change: transform;
    }

    .coin.flipping-heads {
      animation: flipHeads 1.7s cubic-bezier(.12,.7,.1,1) forwards;
    }

    .coin.flipping-tails {
      animation: flipTails 1.7s cubic-bezier(.12,.7,.1,1) forwards;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      backface-visibility: hidden;
      overflow: hidden;
      border: 9px solid #6f3f00;
      background:
        radial-gradient(circle at 32% 28%, #fff6a4 0 8%, #ffd95a 18%, #f1b226 47%, #bf7410 72%, #6e3b00 100%);
      box-shadow:
        inset 0 0 0 5px #ffec8d,
        inset 0 0 0 11px rgba(104,57,0,0.56),
        inset -14px -16px 0 rgba(98,49,0,0.22),
        inset 12px 10px 0 rgba(255,255,255,0.2),
        0 0 0 4px #241000,
        0 0 30px rgba(255,211,68,0.88);
      color: #3b2000;
    }

    .face::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      border: 4px dashed rgba(88,45,0,0.72);
      box-shadow:
        inset 0 0 0 4px rgba(255,240,150,0.42),
        0 0 0 3px rgba(255,255,255,0.13);
    }

    .coin-emblem {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      transform: translateY(-2px);
    }

    .coin-kanji,
    .coin-star {
      display: block;
      font-family: "Arial Black", Impact, sans-serif;
      font-weight: 1000;
      line-height: 0.9;
      text-shadow:
        3px 3px 0 #ffd96b,
        -2px -2px 0 #fff3b3,
        0 5px 0 #754000;
    }

    .coin-kanji {
      font-size: 5.2rem;
    }

    .coin-star {
      font-size: 5rem;
    }

    .coin-label {
      margin-top: 8px;
      padding: 3px 10px;
      border: 3px solid #3b2000;
      background: #ffd64b;
      font-family: "Arial Black", Impact, sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      transform: skewX(-8deg);
      box-shadow: 3px 3px 0 rgba(67,34,0,0.75);
    }

    .heads {
      transform: translateZ(8px);
    }

    .tails {
      transform: rotateY(180deg) translateZ(8px);
    }

    .edge {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 162px;
      margin-left: -8px;
      margin-top: -81px;
      background: repeating-linear-gradient(
        to bottom,
        #ffd74e 0 6px,
        #704000 6px 10px
      );
      transform: rotateY(90deg);
      border-radius: 5px;
      box-shadow:
        inset 3px 0 0 rgba(255,255,255,0.35),
        inset -3px 0 0 rgba(70,30,0,0.38);
    }

    .result {
      min-height: 48px;
      display: grid;
      place-items: center;
      margin-top: -8px;
      font-size: clamp(1.5rem, 4vw, 2.6rem);
      font-weight: 1000;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #fff;
      -webkit-text-stroke: 1px #24101f;
      text-shadow:
        4px 4px 0 #ff3f68,
        0 0 10px #fff,
        0 0 26px #6edfff;
    }

    .result.reveal {
      animation: resultReveal 0.7s cubic-bezier(.18,.88,.26,1.25);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 28px auto 20px;
      max-width: 560px;
    }

    .score {
      padding: 18px;
      border-radius: 20px;
      background:
        radial-gradient(circle, rgba(255,255,255,0.1) 0 1px, transparent 1.4px) 0 0 / 10px 10px,
        rgba(255,255,255,0.065);
      border: 2px solid rgba(255,255,255,0.75);
      box-shadow: inset 0 0 25px rgba(255,255,255,0.035);
    }

    .score span {
      display: block;
      font-size: 0.82rem;
      color: #b8c2ff;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-weight: 800;
    }

    .score strong {
      display: block;
      margin-top: 5px;
      font-size: clamp(2rem, 6vw, 3.6rem);
      line-height: 1;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 15px 26px;
      font: inherit;
      font-weight: 1000;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.02);
      filter: brightness(1.12);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #flipButton {
      color: #241100;
      background: linear-gradient(135deg, #fff59a, #ffb41f);
      box-shadow:
        0 10px 28px rgba(255, 180, 31, 0.35),
        inset 0 1px 0 rgba(255,255,255,0.9);
    }

    #resetButton {
      color: white;
      background: linear-gradient(135deg, #7138db, #e23e82);
      box-shadow: 0 10px 28px rgba(166, 58, 220, 0.3);
    }

    .hint {
      margin-top: 16px;
      color: #8f9ac9;
      font-size: 0.85rem;
    }

    .particle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 12px currentColor;
      animation: particleFly 0.9s ease-out forwards;
    }

    @keyframes flipHeads {
      0%   { transform: translateY(0) rotateY(0deg) rotateX(8deg) scale(1); }
      22%  { transform: translateY(-120px) rotateY(540deg) rotateX(120deg) scale(1.22); }
      65%  { transform: translateY(-35px) rotateY(1260deg) rotateX(300deg) scale(1.08); }
      86%  { transform: translateY(12px) rotateY(1440deg) rotateX(360deg) scale(0.94); }
      100% { transform: translateY(0) rotateY(1440deg) rotateX(360deg) scale(1); }
    }

    @keyframes flipTails {
      0%   { transform: translateY(0) rotateY(0deg) rotateX(8deg) scale(1); }
      22%  { transform: translateY(-120px) rotateY(630deg) rotateX(120deg) scale(1.22); }
      65%  { transform: translateY(-35px) rotateY(1350deg) rotateX(300deg) scale(1.08); }
      86%  { transform: translateY(12px) rotateY(1620deg) rotateX(360deg) scale(0.94); }
      100% { transform: translateY(0) rotateY(1620deg) rotateX(360deg) scale(1); }
    }

    @keyframes superAura {
      0% { transform: scale(0.85) rotate(0deg); opacity: 0.55; filter: blur(12px) hue-rotate(0deg); }
      50% { transform: scale(1.35) rotate(180deg); opacity: 1; filter: blur(7px) hue-rotate(90deg); }
      100% { transform: scale(0.9) rotate(360deg); opacity: 0.65; filter: blur(13px) hue-rotate(180deg); }
    }

    @keyframes pulseAura {
      0%, 100% { transform: scale(0.84); opacity: 0.42; }
      50% { transform: scale(1.04); opacity: 0.78; }
    }

    @keyframes speedBurst {
      0% { opacity: 0; transform: scale(0.8) rotate(0deg); }
      18% { opacity: 0.72; }
      100% { opacity: 0; transform: scale(1.8) rotate(15deg); }
    }

    @keyframes flash {
      0% { opacity: 0; }
      25% { opacity: 0.9; }
      100% { opacity: 0; }
    }

    @keyframes ringExpand {
      0% { opacity: 1; transform: scale(0.3); }
      100% { opacity: 0; transform: scale(6); }
    }

    @keyframes resultReveal {
      0% { opacity: 0; transform: scale(0.45) rotate(-6deg); filter: blur(10px); }
      60% { opacity: 1; transform: scale(1.22) rotate(2deg); filter: blur(0); }
      100% { transform: scale(1) rotate(0); }
    }

    @keyframes particleFly {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      to {
        opacity: 0;
        transform:
          translate(
            calc(-50% + var(--x)),
            calc(-50% + var(--y))
          )
          scale(0);
      }
    }

    @keyframes screenShake {
      0%, 100% { transform: translate(0, 0); }
      15% { transform: translate(-8px, 5px); }
      30% { transform: translate(7px, -5px); }
      45% { transform: translate(-5px, -3px); }
      60% { transform: translate(5px, 4px); }
      75% { transform: translate(-3px, 2px); }
      90% { transform: translate(2px, -2px); }
    }

    @keyframes drift {
      to { background-position: 52px 52px, -65px 115px; }
    }


    .manga-sfx {
      position: absolute;
      z-index: 3;
      font-family: "Arial Black", Impact, sans-serif;
      font-weight: 1000;
      color: rgba(255,255,255,0.16);
      -webkit-text-stroke: 1px rgba(255,255,255,0.24);
      letter-spacing: -0.08em;
      pointer-events: none;
      user-select: none;
    }

    .sfx-left {
      left: 22px;
      top: 35%;
      font-size: clamp(2rem, 5vw, 4.8rem);
      transform: rotate(-11deg);
    }

    .sfx-right {
      right: 24px;
      top: 28%;
      font-size: clamp(2rem, 5vw, 4.5rem);
      color: rgba(255,75,112,0.2);
      transform: rotate(10deg);
    }

    @keyframes sunPulse {
      0%, 100% { transform: scale(0.96) rotate(0deg); opacity: 0.6; }
      50% { transform: scale(1.06) rotate(4deg); opacity: 0.92; }
    }


    .site-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.68);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: lowercase;
    }

    .site-footer span {
      color: #ffd85a;
      font-weight: 1000;
      text-shadow:
        0 0 10px rgba(255,216,90,0.75),
        2px 2px 0 rgba(95,20,55,0.8);
    }

    @media (max-height: 760px) {
      .app {
        place-items: start center;
        padding-top: 24px;
        padding-bottom: 40px;
      }
    }

    @media (max-width: 620px) {
      .panel {
        padding: 24px 16px;
        border-radius: 22px;
      }

      .arena {
        height: 280px;
      }

      .coin-wrapper {
        width: 145px;
        height: 145px;
      }

      .face {
        font-size: 2.3rem;
      }

      .edge {
        height: 127px;
        margin-top: -63.5px;
      }

      .scoreboard {
        gap: 10px;
      }

      button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>
  <div class="manga-sun"></div>
  <div class="manga-grid"></div>
  <div class="manga-ink ink-one"></div>
  <div class="manga-ink ink-two"></div>
  <div class="speed-lines" id="speedLines"></div>
  <div class="particles" id="particles"></div>
  <div class="impact-ring" id="impactRing"></div>
  <div class="flash" id="flash"></div>

  <main class="app">
    <section class="panel">
      <div class="jp-kicker">運命の決戦</div><h1>Coin Clash</h1>
      <p class="subtitle">
        Sfida il destino. Ogni lancio scatena un’esplosione di energia manga.
      </p>

      <div class="manga-sfx sfx-left">ゴゴゴ</div><div class="manga-sfx sfx-right">ドン!</div><div class="arena" id="arena">
        <div class="aura"></div>

        <div class="coin-wrapper">
          <div class="coin" id="coin">
            <div class="face heads">
              <div class="coin-emblem">
                <span class="coin-kanji">運</span>
                <span class="coin-label">TESTA</span>
              </div>
            </div>
            <div class="face tails">
              <div class="coin-emblem">
                <span class="coin-star">★</span>
                <span class="coin-label">CROCE</span>
              </div>
            </div>
            <div class="edge"></div>
          </div>
        </div>
      </div>

      <div class="result" id="result">Pronto al lancio</div>

      <div class="scoreboard">
        <div class="score">
          <span>Testa</span>
          <strong id="headsCount">0</strong>
        </div>
        <div class="score">
          <span>Croce</span>
          <strong id="tailsCount">0</strong>
        </div>
      </div>

      <div class="controls">
        <button id="flipButton">Scatena il lancio</button>
        <button id="resetButton">Reset</button>
      </div>

      <div class="hint">Premi SPAZIO e scatena il colpo finale.</div>

      <footer class="site-footer">
        by <span>a3xp</span>
      </footer>
    </section>

  <script>
    const coin = document.getElementById("coin");
    const arena = document.getElementById("arena");
    const result = document.getElementById("result");
    const headsCountElement = document.getElementById("headsCount");
    const tailsCountElement = document.getElementById("tailsCount");
    const flipButton = document.getElementById("flipButton");
    const resetButton = document.getElementById("resetButton");
    const speedLines = document.getElementById("speedLines");
    const particles = document.getElementById("particles");
    const flash = document.getElementById("flash");
    const impactRing = document.getElementById("impactRing");
    const launchSound = document.getElementById("launchSound");

    let headsCount = 0;
    let tailsCount = 0;
    let isFlipping = false;

    function restartAnimation(element, className) {
      element.classList.remove(className);
      void element.offsetWidth;
      element.classList.add(className);
    }

    function createParticles(amount = 44) {
      particles.innerHTML = "";

      for (let i = 0; i < amount; i++) {
        const particle = document.createElement("span");
        particle.className = "particle";

        const angle = Math.random() * Math.PI * 2;
        const distance = 110 + Math.random() * 260;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        particle.style.setProperty("--x", `${x}px`);
        particle.style.setProperty("--y", `${y}px`);
        particle.style.color = [
          "#ffffff",
          "#64dcff",
          "#b067ff",
          "#ffd85a",
          "#ff4778"
        ][Math.floor(Math.random() * 5)];

        particle.style.width = `${4 + Math.random() * 9}px`;
        particle.style.height = particle.style.width;
        particle.style.animationDelay = `${Math.random() * 0.12}s`;

        particles.appendChild(particle);
      }

      setTimeout(() => {
        particles.innerHTML = "";
      }, 1100);
    }


    function playLaunchSound() {
      launchSound.pause();
      launchSound.currentTime = 0;
      launchSound.play().catch(() => {
        // Alcuni browser possono bloccare l'audio finché non avviene un'interazione.
      });
    }

    function flipCoin() {
      if (isFlipping) return;

      isFlipping = true;
      playLaunchSound();
      flipButton.disabled = true;
      resetButton.disabled = true;
      result.textContent = "Il destino si sta decidendo...";
      result.classList.remove("reveal");

      const isHeads = Math.random() < 0.5;
      const animationClass = isHeads ? "flipping-heads" : "flipping-tails";

      coin.className = "coin";
      void coin.offsetWidth;
      coin.classList.add(animationClass);

      arena.classList.add("flipping");
      restartAnimation(speedLines, "active");

      setTimeout(() => {
        restartAnimation(flash, "active");
      }, 1120);

      setTimeout(() => {
        restartAnimation(impactRing, "active");
        createParticles();

        document.body.classList.remove("shake");
        void document.body.offsetWidth;
        document.body.classList.add("shake");
      }, 1450);

      setTimeout(() => {
        arena.classList.remove("flipping");

        if (isHeads) {
          headsCount++;
          headsCountElement.textContent = headsCount;
          result.textContent = "TESTA!";
        } else {
          tailsCount++;
          tailsCountElement.textContent = tailsCount;
          result.textContent = "CROCE!";
        }

        restartAnimation(result, "reveal");
        isFlipping = false;
        flipButton.disabled = false;
        resetButton.disabled = false;
      }, 1700);
    }

    function resetGame() {
      if (isFlipping) return;

      headsCount = 0;
      tailsCount = 0;
      headsCountElement.textContent = "0";
      tailsCountElement.textContent = "0";
      result.textContent = "Pronto al lancio";
      result.classList.remove("reveal");

      coin.className = "coin";
      coin.style.transform = "rotateY(0deg) rotateX(8deg)";
    }

    flipButton.addEventListener("click", flipCoin);
    resetButton.addEventListener("click", resetGame);

    window.addEventListener("keydown", event => {
      if (event.code === "Space") {
        event.preventDefault();
        flipCoin();
      }
    });
  </script>
</body>
</html>
